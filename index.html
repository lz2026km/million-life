<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>百万人生 v2.0 — 体彩分析推荐</title>
  <style>
    :root {
      --gold: #F59E0B;
      --gold-light: #FBBF24;
      --gold-glow: rgba(245,158,11,0.35);
      --gold-bg: rgba(245,158,11,0.08);
      --purple: #8B5CF6;
      --purple-light: #A78BFA;
      --bg: #0A0E1A;
      --bg2: #0F1629;
      --card: rgba(30,41,59,0.7);
      --card-glass: rgba(255,255,255,0.04);
      --card-hover: rgba(255,255,255,0.08);
      --border: rgba(255,255,255,0.08);
      --border-gold: rgba(245,158,11,0.3);
      --text: #F8FAFC;
      --text-dim: #64748B;
      --text-mid: #94A3B8;
      --red: #EF4444;
      --blue: #3B82F6;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: "Noto Sans SC", "PingFang SC", -apple-system, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      font-size: 16px;
      line-height: 1.6;
      overflow-x: hidden;
    }

    /* ===== ANIMATED BG ===== */
    .bg-orbs {
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 0;
      overflow: hidden;
    }
    .orb {
      position: absolute;
      border-radius: 50%;
      filter: blur(80px);
      opacity: 0.4;
      animation: float 12s ease-in-out infinite;
    }
    .orb-1 {
      width: 400px; height: 400px;
      background: radial-gradient(circle, rgba(245,158,11,0.3), transparent 70%);
      top: -100px; left: -100px;
      animation-delay: 0s;
    }
    .orb-2 {
      width: 350px; height: 350px;
      background: radial-gradient(circle, rgba(139,92,246,0.25), transparent 70%);
      bottom: -80px; right: -80px;
      animation-delay: -4s;
    }
    .orb-3 {
      width: 250px; height: 250px;
      background: radial-gradient(circle, rgba(245,158,11,0.15), transparent 70%);
      top: 40%; left: 50%;
      animation-delay: -8s;
    }
    @keyframes float {
      0%, 100% { transform: translate(0,0) scale(1); }
      33% { transform: translate(30px,-20px) scale(1.05); }
      66% { transform: translate(-20px,15px) scale(0.95); }
    }

    /* ===== LAYOUT ===== */
    .app {
      position: relative;
      z-index: 1;
      max-width: 720px;
      margin: 0 auto;
      padding: 0 20px 60px;
    }

    /* ===== HERO HEADER ===== */
    .hero {
      text-align: center;
      padding: 36px 0 28px;
      position: relative;
    }
    .hero::after {
      content: '';
      display: block;
      height: 1px;
      background: linear-gradient(90deg, transparent, var(--border-gold), transparent);
      margin-top: 28px;
    }
    .hero-badge {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      background: var(--gold-bg);
      border: 1px solid var(--border-gold);
      border-radius: 20px;
      padding: 4px 14px;
      font-size: 0.72rem;
      color: var(--gold-light);
      margin-bottom: 14px;
      letter-spacing: 0.5px;
    }
    .hero h1 {
      font-family: "Noto Serif SC", SimHei, serif;
      font-size: 2.4rem;
      font-weight: 900;
      background: linear-gradient(135deg, #FDE68A 0%, var(--gold-light) 40%, var(--gold) 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      letter-spacing: 2px;
      margin-bottom: 6px;
    }
    .hero-sub {
      font-size: 0.82rem;
      color: var(--text-dim);
      letter-spacing: 3px;
    }

    /* ===== GLASS CARD ===== */
    .glass-card {
      background: var(--card);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 20px;
      margin-bottom: 16px;
      transition: border-color 0.3s;
    }
    .glass-card:hover {
      border-color: var(--border-gold);
    }

    /* ===== LOTTERY TYPE SELECTOR ===== */
    .type-selector {
      display: flex;
      gap: 10px;
      margin-bottom: 16px;
    }
    .type-btn {
      flex: 1;
      padding: 14px;
      border-radius: 14px;
      border: 1.5px solid var(--border);
      background: var(--card-glass);
      color: var(--text-dim);
      font-size: 0.95rem;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.25s;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 4px;
    }
    .type-btn .t-emoji { font-size: 1.6rem; }
    .type-btn .t-name { font-size: 0.85rem; }
    .type-btn .t-sub { font-size: 0.68rem; opacity: 0.7; }
    .type-btn.active {
      border-color: var(--gold);
      background: var(--gold-bg);
      color: var(--gold-light);
      box-shadow: 0 0 20px var(--gold-glow), inset 0 0 20px rgba(245,158,11,0.05);
    }
    .type-btn:not(.active):hover {
      border-color: rgba(245,158,11,0.4);
      background: var(--card-hover);
    }

    /* ===== SECTION TITLE ===== */
    .sec-title {
      font-size: 0.75rem;
      color: var(--text-dim);
      letter-spacing: 1.5px;
      text-transform: uppercase;
      margin-bottom: 12px;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .sec-title::after {
      content: '';
      flex: 1;
      height: 1px;
      background: var(--border);
    }

    /* ===== HISTORY ===== */
    .history-scroll {
      display: flex;
      flex-direction: column;
      gap: 6px;
      max-height: 240px;
      overflow-y: auto;
      scrollbar-width: thin;
      scrollbar-color: var(--gold) transparent;
    }
    .history-scroll::-webkit-scrollbar { width: 4px; }
    .history-scroll::-webkit-scrollbar-thumb { background: var(--gold); border-radius: 2px; }
    .hrow {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 8px 12px;
      background: var(--card-glass);
      border-radius: 10px;
      border: 1px solid var(--border);
      transition: background 0.2s;
    }
    .hrow:hover { background: var(--card-hover); }
    .hperiod {
      font-size: 0.72rem;
      color: var(--text-dim);
      min-width: 62px;
      font-family: "SF Mono", monospace;
    }
    .hballs {
      display: flex;
      gap: 4px;
      align-items: center;
    }
    .ball {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 26px;
      height: 26px;
      border-radius: 50%;
      font-size: 0.72rem;
      font-weight: 700;
      flex-shrink: 0;
    }
    .ball-r { background: linear-gradient(135deg, #EF4444, #DC2626); color: #fff; box-shadow: 0 2px 8px rgba(239,68,68,0.4); }
    .ball-b { background: linear-gradient(135deg, #3B82F6, #2563EB); color: #fff; box-shadow: 0 2px 8px rgba(59,130,246,0.4); }
    .ball-a { background: linear-gradient(135deg, #8B5CF6, #7C3AED); color: #fff; box-shadow: 0 2px 8px rgba(139,92,246,0.4); }
    .sep { color: var(--text-dim); margin: 0 1px; font-size: 0.65rem; }

    /* ===== ALGORITHM CARDS ===== */
    .algo-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
    }
    .algo-card {
      background: var(--card-glass);
      border: 1.5px solid var(--border);
      border-radius: 14px;
      padding: 14px;
      cursor: pointer;
      transition: all 0.25s;
      display: flex;
      align-items: flex-start;
      gap: 12px;
      position: relative;
      overflow: hidden;
    }
    .algo-card::before {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(135deg, var(--gold-glow), transparent);
      opacity: 0;
      transition: opacity 0.3s;
    }
    .algo-card:hover::before { opacity: 0.3; }
    .algo-card.selected {
      border-color: var(--gold);
      background: rgba(245,158,11,0.06);
    }
    .algo-card.selected::before { opacity: 1; }
    .algo-icon {
      width: 40px;
      height: 40px;
      border-radius: 10px;
      background: var(--card-glass);
      border: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.2rem;
      flex-shrink: 0;
      position: relative;
      z-index: 1;
    }
    .algo-card.selected .algo-icon {
      background: var(--gold-bg);
      border-color: var(--border-gold);
    }
    .algo-info { flex: 1; position: relative; z-index: 1; }
    .algo-name { font-size: 0.88rem; font-weight: 700; color: var(--text); margin-bottom: 2px; }
    .algo-desc { font-size: 0.72rem; color: var(--text-dim); line-height: 1.4; }
    .algo-check {
      position: absolute;
      top: 10px;
      right: 10px;
      width: 20px;
      height: 20px;
      border-radius: 50%;
      border: 1.5px solid var(--border);
      background: var(--card-glass);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 0.65rem;
      color: transparent;
      transition: all 0.25s;
      z-index: 1;
    }
    .algo-card.selected .algo-check {
      background: var(--gold);
      border-color: var(--gold);
      color: #000;
    }

    /* ===== GENERATE BUTTON ===== */
    .gen-btn {
      width: 100%;
      padding: 18px;
      background: linear-gradient(135deg, #D97706 0%, var(--gold) 50%, #FBBF24 100%);
      border: none;
      border-radius: 16px;
      color: #000;
      font-size: 1.05rem;
      font-weight: 800;
      cursor: pointer;
      transition: all 0.25s;
      margin: 6px 0 20px;
      font-family: inherit;
      letter-spacing: 1px;
      position: relative;
      overflow: hidden;
      box-shadow: 0 4px 24px rgba(245,158,11,0.3);
    }
    .gen-btn::after {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(135deg, transparent 30%, rgba(255,255,255,0.3) 50%, transparent 70%);
      transform: translateX(-100%);
      transition: transform 0.6s;
    }
    .gen-btn:hover::after { transform: translateX(100%); }
    .gen-btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 32px rgba(245,158,11,0.5);
    }
    .gen-btn:active { transform: translateY(0) scale(0.98); }

    /* ===== RESULTS ===== */
    .results-area { min-height: 80px; }
    .rempty {
      text-align: center;
      padding: 30px;
      color: var(--text-dim);
      font-size: 0.85rem;
    }
    .rempty-icon { font-size: 2rem; margin-bottom: 8px; opacity: 0.5; }

    .result-card {
      background: var(--card-glass);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 16px 18px;
      margin-bottom: 10px;
      position: relative;
      overflow: hidden;
    }
    .result-card::before {
      content: '';
      position: absolute;
      left: 0; top: 0; bottom: 0;
      width: 3px;
      background: linear-gradient(to bottom, var(--gold), var(--purple));
      border-radius: 3px 0 0 3px;
    }
    .r-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 12px;
    }
    .r-tag {
      font-size: 0.7rem;
      background: var(--gold-bg);
      color: var(--gold-light);
      border: 1px solid var(--border-gold);
      border-radius: 6px;
      padding: 2px 8px;
    }
    .r-algo-names {
      font-size: 0.7rem;
      color: var(--text-dim);
    }
    .r-nums {
      display: flex;
      align-items: center;
      gap: 6px;
      flex-wrap: wrap;
    }
    .r-nums .ball {
      width: 34px;
      height: 34px;
      font-size: 0.88rem;
    }
    .r-label {
      font-size: 0.65rem;
      color: var(--text-dim);
      margin: 0 4px;
      align-self: center;
    }

    /* ===== STATS ===== */
    .stat-tabs {
      display: flex;
      gap: 6px;
      margin-bottom: 12px;
    }
    .stat-tab {
      padding: 6px 14px;
      border-radius: 8px;
      border: 1px solid var(--border);
      background: var(--card-glass);
      color: var(--text-dim);
      font-size: 0.8rem;
      cursor: pointer;
      transition: all 0.2s;
    }
    .stat-tab.active {
      border-color: var(--gold);
      color: var(--gold);
      background: var(--gold-bg);
    }
    .stat-list {
      display: flex;
      flex-direction: column;
      gap: 6px;
    }
    .stat-row {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 7px 10px;
      background: var(--card-glass);
      border-radius: 8px;
      border: 1px solid var(--border);
    }
    .stat-row .ball {
      width: 24px;
      height: 24px;
      font-size: 0.68rem;
    }
    .stat-name { flex: 1; font-size: 0.78rem; color: var(--text-dim); }
    .stat-bar-wrap { width: 80px; height: 5px; background: rgba(255,255,255,0.06); border-radius: 3px; overflow: hidden; }
    .stat-bar-fill {
      height: 100%;
      background: linear-gradient(90deg, var(--gold-dark), var(--gold-light));
      border-radius: 3px;
      transition: width 0.6s ease;
    }
    .stat-val { font-size: 0.78rem; color: var(--gold); min-width: 28px; text-align: right; font-weight: 600; }

    /* ===== DISCLAIMER ===== */
    .disclaimer {
      text-align: center;
      font-size: 0.72rem;
      color: var(--text-dim);
      padding: 20px 0;
      border-top: 1px solid var(--border);
      margin-top: 8px;
      line-height: 1.8;
    }
    .disclaimer strong { color: var(--gold); }

    /* ===== ANIMATIONS ===== */
    @keyframes ballIn {
      0% { transform: scale(0) rotate(-20deg); opacity: 0; }
      60% { transform: scale(1.25) rotate(5deg); }
      100% { transform: scale(1) rotate(0deg); opacity: 1; }
    }
    @keyframes cardIn {
      0% { transform: translateY(16px); opacity: 0; }
      100% { transform: translateY(0); opacity: 1; }
    }
    .ball-anim { animation: ballIn 0.4s cubic-bezier(0.34,1.56,0.64,1) forwards; }
    .result-card { animation: cardIn 0.4s ease forwards; }

    /* ===== MOBILE ===== */
    @media (max-width: 480px) {
      .hero h1 { font-size: 1.9rem; }
      .algo-grid { grid-template-columns: 1fr; }
      .app { padding: 0 14px 60px; }
    }
  </style>
</head>

  <!-- DISCLAIMER -->

// ==================== 状态 ====================
let currentType = 'ssq';
let selectedAlgos = new Set(['hot-cold', 'monte-carlo']);
let currentStat = 'hot';

// ==================== DOM ====================
const btnSSQ = document.getElementById('btnSSQ');
const btnDLT = document.getElementById('btnDLT');
const historyWrap = document.getElementById('historyWrap');
const algoGrid = document.getElementById('algoGrid');

// ==================== 初始化 ====================
function init() {
  renderHistory();
  renderStat();
  bindEvents();
}

function getHistory() {
  return currentType === 'ssq' ? SSQ_HISTORY : DLT_HISTORY;
}

// ==================== 渲染历史 ====================
function renderHistory() {
  const hist = getHistory();
  historyWrap.innerHTML = hist.map(h => {
    if (currentType === 'ssq') {
      const reds = h.r.map(n => `<span class="ball ball-r">${n}</span>`).join('');
      return `<div class="hrow">
        <span class="hperiod">${h.p}</span>
        <div class="hballs">${reds}<span class="sep">+</span><span class="ball ball-b">${h.b}</span></div>
      </div>`;
    } else {
      const fronts = h.f.map(n => `<span class="ball ball-r">${n}</span>`).join('');
      const backs = h.b.map(n => `<span class="ball ball-b">${n}</span>`).join('');
      return `<div class="hrow">
        <span class="hperiod">${h.p}</span>
        <div class="hballs">${fronts}<span class="sep">·</span>${backs}</div>
      </div>`;
    }
  }).join('');
}

// ==================== 渲染统计 ====================
function renderStat() {
  const hist = getHistory();
  const limit = currentType === 'ssq' ? 33 : 35;
  const blueLimit = currentType === 'ssq' ? 16 : 12;

  const freq = {};
  for (let i = 1; i <= limit; i++) freq[i] = 0;
  const miss = {};
  for (let i = 1; i <= limit; i++) miss[i] = 0;
  const blueFreq = {};
  for (let i = 1; i <= blueLimit; i++) blueFreq[i] = 0;
  const blueMiss = {};
  for (let i = 1; i <= blueLimit; i++) blueMiss[i] = 0;

  hist.forEach((h, idx) => {
    if (currentType === 'ssq') {
      h.r.forEach(n => { freq[n]++; });
      blueFreq[h.b]++;
      h.r.forEach(n => { miss[n] = 0; });
      for (let i = 1; i <= limit; i++) if (freq[i] === 0) miss[i]++;
      blueMiss[h.b] = 0;
      for (let i = 1; i <= blueLimit; i++) if (blueFreq[i] === 0) blueMiss[i]++;
    } else {
      h.f.forEach(n => { freq[n]++; });
      h.b.forEach(n => { blueFreq[n]++; });
      for (let i = 1; i <= limit; i++) if (freq[i] === 0) miss[i]++;
      for (let i = 1; i <= blueLimit; i++) if (blueFreq[i] === 0) blueMiss[i]++;
    }
  });

  let entries = Object.entries(freq).map(([n, f]) => ({ n: +n, f, m: miss[+n] }));
  entries.sort((a, b) => currentStat === 'hot' ? b.f - a.f : currentStat === 'cold' ? a.f - b.f : b.m - a.m);
  entries = entries.slice(0, 10);

  const maxF = Math.max(...entries.map(e => e.f));
  const maxM = Math.max(...entries.map(e => e.m));

  statList.innerHTML = entries.map(e => {
    const barW = currentStat === 'miss' ? (maxM ? e.m / maxM * 100 : 0) : (maxF ? e.f / maxF * 100 : 0);
    const label = currentStat === 'hot' ? `${e.f}次` : currentStat === 'cold' ? `${e.f}次` : `遗漏${e.m}期`;
    return `<div class="stat-row">
      <span class="ball ball-r">${e.n}</span>
      <span class="stat-name">第${e.n}号</span>
      <div class="stat-bar-wrap"><div class="stat-bar-fill" style="width:${barW}%"></div></div>
      <span class="stat-val">${label}</span>
    </div>`;
  }).join('');
}

// ==================== 事件绑定 ====================
function bindEvents() {
  btnSSQ.addEventListener('click', () => {
    currentType = 'ssq';
    btnSSQ.classList.add('active');
    btnDLT.classList.remove('active');
    renderHistory();
    renderStat();
  });

  btnDLT.addEventListener('click', () => {
    currentType = 'dlt';
    btnDLT.classList.add('active');
    btnSSQ.classList.remove('active');
    renderHistory();
    renderStat();
  });

  // 算法选择
  algoGrid.querySelectorAll('.algo-card').forEach(card => {
    card.addEventListener('click', () => {
      const algo = card.dataset.algo;
      if (selectedAlgos.has(algo)) {
        if (selectedAlgos.size > 1) {
          selectedAlgos.delete(algo);
          card.classList.remove('selected');
        }
      } else {
        selectedAlgos.add(algo);
        card.classList.add('selected');
      }
    });
  });

  // 统计切换
  statTabs.querySelectorAll('.stat-tab').forEach(tab => {
    tab.addEventListener('click', () => {
      currentStat = tab.dataset.stat;
      statTabs.querySelectorAll('.stat-tab').forEach(t => t.classList.remove('active'));
      tab.classList.add('active');
      renderStat();
    });
  });

  // 生成
  genBtn.addEventListener('click', generate);
}

// ==================== 算法 ====================
function weightedSample(arr, weights, count) {
  const pairs = arr.map((v, i) => ({ v, w: weights[i] || 0.01 }));
  const total = pairs.reduce((s, p) => s + p.w, 0);
  const probs = pairs.map(p => p.w / total);
  const chosen = [];
  const pool = [...pairs];
  const pPool = [...probs];
  for (let i = 0; i < count && pool.length > 0; i++) {
    let r = Math.random();
    let cum = 0;
    for (let j = 0; j < pPool.length; j++) {
      cum += pPool[j];
      if (r <= cum) { chosen.push(pool[j].v); pool.splice(j, 1); pPool.splice(j, 1); break; }
    }
    if (chosen.length === i) { chosen.push(pool[0].v); pool.shift(); pPool.shift(); }
  }
  return chosen;
}

function shuffle(arr) {
  const a = [...arr];
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

function getAlgos(type) {
  const hist = type === 'ssq' ? SSQ_HISTORY : DLT_HISTORY;
  const allR = hist.map(h => h.r).flat();
  const allB = hist.flatMap(h => Array.isArray(h.b) ? h.b : [h.b]);
  const limit = type === 'ssq' ? 33 : 35;
  const blueLimit = type === 'ssq' ? 16 : 12;

  const rFreq = {}; for (let i = 1; i <= limit; i++) rFreq[i] = 0;
  const bFreq = {}; for (let i = 1; i <= blueLimit; i++) bFreq[i] = 0;
  const rMiss = {}; for (let i = 1; i <= limit; i++) rMiss[i] = 0;
  const bMiss = {}; for (let i = 1; i <= blueLimit; i++) bMiss[i] = 0;

  hist.forEach((h, hi) => {
    h.r.forEach(n => { rFreq[n]++; rMiss[n] = 0; });
    (Array.isArray(h.b) ? h.b : [h.b]).forEach(n => { bFreq[n]++; bMiss[n] = 0; });
    for (let i = 1; i <= limit; i++) if (rFreq[i] === 0) rMiss[i]++;
    for (let i = 1; i <= blueLimit; i++) if (bFreq[i] === 0) bMiss[i]++;
  });

  const rVals = Object.keys(rFreq).map(Number);
  const bVals = Object.keys(bFreq).map(Number);
  const rWeights = rVals.map(n => (rFreq[n] || 0) + (rMiss[n] || 0) * 1.5);
  const bWeights = bVals.map(n => (bFreq[n] || 0) + (bMiss[n] || 0) * 1.5);

  return {
    hotCold(type) {
      const reds = weightedSample(rVals, rWeights, type === 'ssq' ? 6 : 5);
      let blue;
      if (type === 'ssq') {
        blue = [weightedSample(bVals, bWeights, 1)[0]];
      } else {
        const blue1 = weightedSample(bVals, bWeights, 1)[0];
        const remainingB = bVals.filter(n => n !== blue1);
        const remainingW = bWeights.map((w, i) => bVals[i] === blue1 ? 0 : w);
        const blue2 = weightedSample(remainingB, remainingW, 1)[0];
        blue = [blue1, blue2].sort((a, b) => a - b);
      }
      return { reds, blue };
    },
    oddEven(type) {
      const targetOdd = type === 'ssq' ? 4 : 3;
      const reds = [];
      const odds = rVals.filter(n => n % 2 === 1);
      const evens = rVals.filter(n => n % 2 === 0);
      const shuffledOdds = shuffle(odds);
      const shuffledEvens = shuffle(evens);
      let added = 0;
      while (reds.length < (type === 'ssq' ? 6 : 5)) {
        if (added < targetOdd && shuffledOdds.length) reds.push(shuffledOdds.shift());
        else if (shuffledEvens.length) reds.push(shuffledEvens.shift());
        else if (shuffledOdds.length) reds.push(shuffledOdds.shift());
        added++;
      }
      reds.sort((a, b) => a - b);
      const blue = type === 'ssq'
        ? [Math.floor(Math.random() * blueLimit) + 1]
        : shuffle([1, 2]).map(() => Math.floor(Math.random() * blueLimit) + 1).sort((a, b) => a - b);
      return { reds, blue };
    },
    zone(type) {
      const zones = type === 'ssq' ? 3 : 5;
      const perZone = type === 'ssq' ? 2 : 1;
      const range = type === 'ssq' ? 33 : 35;
      const reds = [];
      for (let z = 0; z < zones; z++) {
        const start = Math.floor(z * range / zones) + 1;
        const end = Math.floor((z + 1) * range / zones);
        const zoneNums = [];
        for (let n = start; n <= end; n++) zoneNums.push(n);
        const zoneFreq = zoneNums.map(n => rFreq[n] || 0);
        const picked = weightedSample(zoneNums, zoneFreq, perZone);
        reds.push(...picked);
      }
      reds.sort((a, b) => a - b);
      const blue = type === 'ssq'
        ? [Math.floor(Math.random() * blueLimit) + 1]
        : shuffle([1, 2]).map(() => Math.floor(Math.random() * blueLimit) + 1).sort((a, b) => a - b);
      return { reds, blue };
    },
    tail(type) {
      const tails = {};
      for (let i = 0; i <= 9; i++) tails[i] = 0;
      allR.forEach(n => { tails[n % 10]++; });
      const tailWeights = Object.entries(tails).map(([t, f]) => ({ t: +t, f }));
      tailWeights.sort((a, b) => b.f - a.f);
      const topTails = tailWeights.slice(0, 5).map(x => x.t);
      const reds = [];
      while (reds.length < (type === 'ssq' ? 6 : 5)) {
        const t = topTails[Math.floor(Math.random() * topTails.length)];
        const candidates = rVals.filter(n => n % 10 === t && !reds.includes(n));
        if (candidates.length) reds.push(candidates[Math.floor(Math.random() * candidates.length)]);
        else {
          const c2 = rVals.filter(n => !reds.includes(n));
          if (c2.length) reds.push(c2[Math.floor(Math.random() * c2.length)]);
        }
        if (reds.length === reds.length) break;
      }
      reds.sort((a, b) => a - b);
      const blue = type === 'ssq'
        ? [Math.floor(Math.random() * blueLimit) + 1]
        : shuffle([1, 2]).map(() => Math.floor(Math.random() * blueLimit) + 1).sort((a, b) => a - b);
      return { reds, blue };
    },
    monteCarlo(type) {
      const trials = 1000;
      let best = null, bestScore = -1;
      const range = type === 'ssq' ? 33 : 35;
      const blueRange = type === 'ssq' ? 16 : 12;
      for (let t = 0; t < trials; t++) {
        const reds = shuffle(Array.from({ length: range }, (_, i) => i + 1)).slice(0, type === 'ssq' ? 6 : 5);
        reds.sort((a, b) => a - b);
        let score = reds.reduce((s, n) => s + (rFreq[n] || 0) + (rMiss[n] || 0), 0);
        const blue = type === 'ssq'
          ? [Math.floor(Math.random() * blueRange) + 1]
          : shuffle([1, 2]).map(() => Math.floor(Math.random() * blueRange) + 1).sort((a, b) => a - b);
        if (score > bestScore) { bestScore = score; best = { reds, blue }; }
      }
      return best || { reds: [1, 2, 3, 4, 5, 6], blue: [1] };
    }
  };
}

// ==================== 生成 ====================
function generate() {
  if (selectedAlgos.size === 0) {
    resultsArea.innerHTML = `<div class="rempty"><div class="rempty-icon">⚠️</div><div>请至少选择一个算法</div></div>`;
    return;
  }

  const algos = getAlgos(currentType);
  const algoNames = {
    'hot-cold': '冷热号',
    'odd-even': '奇偶',
    'zone': '区间',
    'tail': '尾数',
    'monte-carlo': '蒙特卡洛'
  };

  const results = [];
  for (const algo of selectedAlgos) {
    if (algos[algo]) {
      results.push({
        algo,
        name: algoNames[algo] || algo,
        nums: algos[algo](currentType)
      });
    }
  }

  resultsArea.innerHTML = results.map((r, i) => {
    const redsHtml = r.nums.reds.map((n, idx) =>
      `<span class="ball ball-r ball-anim" style="animation-delay:${idx * 0.06}s">${n}</span>`
    ).join('');
    const blueHtml = r.nums.blue.map((n, idx) =>
      `<span class="ball ball-b ball-anim" style="animation-delay:${(r.nums.reds.length + idx) * 0.06}s">${n}</span>`
    ).join('');
    const label = currentType === 'ssq' ? '红球' : '前区';
    const blueLabel = currentType === 'ssq' ? '蓝球' : '后区';
    const sep = currentType === 'ssq' ? '<span class="r-label">+</span>' : '<span class="r-label">·</span>';

    return `<div class="result-card" style="animation-delay:${i * 0.12}s">
      <div class="r-header">
        <span class="r-tag">第${i + 1}注</span>
        <span class="r-algo-names">${r.name}</span>
      </div>
      <div class="r-nums">
        ${redsHtml}${sep}${blueHtml}
      </div>
    </div>`;
  }).join('');
}
