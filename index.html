<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>百万人生 — 体彩分析推荐</title>
  <style>
    :root {
      --bg: #F7F8FA;
      --surface: #FFFFFF;
      --surface2: #F0F2F5;
      --text: #1A1A2E;
      --text2: #5C6370;
      --text3: #9CA3AF;
      --border: #E5E7EB;
      --mint: #10B981;
      --mint-light: #D1FAE5;
      --mint-dark: #059669;
      --coral: #F43F5E;
      --sky: #0EA5E9;
      --sky-light: #E0F2FE;
      --gold: #F59E0B;
      --gold-light: #FEF3C7;
      --shadow: 0 1px 3px rgba(0,0,0,0.06), 0 1px 2px rgba(0,0,0,0.04);
      --shadow-md: 0 4px 12px rgba(0,0,0,0.08);
      --radius: 14px;
      --radius-sm: 8px;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: "Noto Sans SC", "PingFang SC", -apple-system, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      font-size: 15px;
      line-height: 1.7;
      -webkit-font-smoothing: antialiased;
    }

    /* ===== LAYOUT ===== */
    .container {
      max-width: 520px;
      margin: 0 auto;
      padding: 0 20px 60px;
    }

    /* ===== HEADER ===== */
    header {
      padding: 40px 0 28px;
      text-align: center;
    }
    header .logo {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 6px;
    }
    header .logo-icon {
      width: 36px;
      height: 36px;
      background: linear-gradient(135deg, var(--coral), #FB7185);
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.1rem;
    }
    header h1 {
      font-size: 1.6rem;
      font-weight: 700;
      color: var(--text);
      letter-spacing: 1px;
    }
    header .sub {
      font-size: 0.78rem;
      color: var(--text3);
      letter-spacing: 2px;
    }

    /* ===== TYPE SELECTOR ===== */
    .type-row {
      display: flex;
      gap: 10px;
      margin-bottom: 24px;
    }
    .type-btn {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      padding: 14px;
      background: var(--surface);
      border: 1.5px solid var(--border);
      border-radius: var(--radius);
      cursor: pointer;
      transition: all 0.2s;
      font-size: 0.9rem;
      font-weight: 600;
      color: var(--text2);
    }
    .type-btn .t-icon { font-size: 1.2rem; }
    .type-btn.active {
      border-color: var(--mint);
      background: var(--mint-light);
      color: var(--mint-dark);
    }
    .type-btn:not(.active):hover {
      border-color: var(--mint);
      background: var(--surface);
    }

    /* ===== CARD ===== */
    .card {
      background: var(--surface);
      border-radius: var(--radius);
      padding: 18px 20px;
      margin-bottom: 14px;
      box-shadow: var(--shadow);
      border: 1px solid var(--border);
    }

    /* ===== SECTION TITLE ===== */
    .s-title {
      font-size: 0.72rem;
      font-weight: 600;
      color: var(--text3);
      letter-spacing: 1.5px;
      text-transform: uppercase;
      margin-bottom: 12px;
    }

    /* ===== HISTORY ===== */
    .h-scroll {
      max-height: 220px;
      overflow-y: auto;
      scrollbar-width: thin;
      scrollbar-color: var(--border) transparent;
    }
    .h-scroll::-webkit-scrollbar { width: 4px; }
    .h-scroll::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }
    .h-row {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 7px 0;
      border-bottom: 1px solid var(--surface2);
    }
    .h-row:last-child { border-bottom: none; }
    .h-p {
      font-size: 0.7rem;
      color: var(--text3);
      min-width: 58px;
      font-family: "SF Mono", monospace;
    }
    .h-balls { display: flex; gap: 4px; align-items: center; flex-wrap: wrap; }
    .ball {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 24px;
      height: 24px;
      border-radius: 50%;
      font-size: 0.68rem;
      font-weight: 700;
      flex-shrink: 0;
    }
    .ball-r {
      background: var(--coral);
      color: #fff;
    }
    .ball-b {
      background: var(--sky);
      color: #fff;
    }
    .sep { color: var(--text3); margin: 0 1px; font-size: 0.6rem; }

    /* ===== ALGORITHMS ===== */
    .algo-list { display: flex; flex-direction: column; gap: 8px; }
    .algo-item {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 13px 14px;
      background: var(--surface2);
      border: 1.5px solid transparent;
      border-radius: var(--radius-sm);
      cursor: pointer;
      transition: all 0.2s;
    }
    .algo-item:hover { background: var(--surface); border-color: var(--border); }
    .algo-item.selected {
      background: var(--gold-light);
      border-color: var(--gold);
    }
    .algo-icon {
      width: 32px;
      height: 32px;
      border-radius: 8px;
      background: var(--surface);
      border: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1rem;
      flex-shrink: 0;
    }
    .algo-item.selected .algo-icon {
      background: var(--surface);
      border-color: var(--gold);
    }
    .algo-name { font-size: 0.88rem; font-weight: 600; color: var(--text); }
    .algo-desc { font-size: 0.72rem; color: var(--text3); }
    .algo-check {
      margin-left: auto;
      width: 20px;
      height: 20px;
      border-radius: 50%;
      border: 1.5px solid var(--border);
      background: var(--surface);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 0.6rem;
      color: transparent;
      transition: all 0.2s;
      flex-shrink: 0;
    }
    .algo-item.selected .algo-check {
      background: var(--gold);
      border-color: var(--gold);
      color: #fff;
    }

    /* ===== GENERATE BUTTON ===== */
    .gen-btn {
      width: 100%;
      padding: 15px;
      background: var(--text);
      color: #fff;
      border: none;
      border-radius: var(--radius);
      font-size: 0.95rem;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
      font-family: inherit;
      letter-spacing: 0.5px;
      margin-bottom: 14px;
    }
    .gen-btn:hover {
      background: #2D2D44;
      transform: translateY(-1px);
      box-shadow: var(--shadow-md);
    }
    .gen-btn:active { transform: translateY(0); }

    /* ===== RESULTS ===== */
    .r-empty {
      text-align: center;
      padding: 28px;
      color: var(--text3);
      font-size: 0.85rem;
    }
    .r-empty-icon { font-size: 2rem; margin-bottom: 8px; opacity: 0.5; }

    .r-card {
      padding: 16px;
      border: 1px solid var(--border);
      border-radius: var(--radius);
      margin-bottom: 10px;
      background: var(--surface);
    }
    .r-head {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 12px;
    }
    .r-num {
      font-size: 0.7rem;
      font-weight: 600;
      color: var(--mint-dark);
      background: var(--mint-light);
      padding: 2px 8px;
      border-radius: 4px;
    }
    .r-algo { font-size: 0.7rem; color: var(--text3); }
    .r-balls { display: flex; align-items: center; gap: 5px; flex-wrap: wrap; }
    .r-balls .ball {
      width: 30px;
      height: 30px;
      font-size: 0.82rem;
    }
    .r-sep { color: var(--text3); font-size: 0.7rem; margin: 0 2px; }

    /* ===== STATS ===== */
    .stat-tabs { display: flex; gap: 6px; margin-bottom: 12px; }
    .s-tab {
      padding: 5px 12px;
      border-radius: 6px;
      border: 1px solid var(--border);
      background: var(--surface2);
      color: var(--text3);
      font-size: 0.78rem;
      cursor: pointer;
      transition: all 0.2s;
    }
    .s-tab.active {
      background: var(--mint-light);
      border-color: var(--mint);
      color: var(--mint-dark);
    }
    .stat-rows { display: flex; flex-direction: column; gap: 6px; }
    .st-row {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 6px 10px;
      background: var(--surface2);
      border-radius: var(--radius-sm);
    }
    .st-row .ball { width: 22px; height: 22px; font-size: 0.62rem; }
    .st-name { flex: 1; font-size: 0.75rem; color: var(--text2); }
    .st-bar { width: 72px; height: 4px; background: var(--border); border-radius: 2px; overflow: hidden; }
    .st-bar-fill { height: 100%; background: var(--mint); border-radius: 2px; transition: width 0.5s ease; }
    .st-val { font-size: 0.75rem; color: var(--mint-dark); min-width: 32px; text-align: right; font-weight: 600; }

    /* ===== DISCLAIMER ===== */
    .disclaimer {
      text-align: center;
      font-size: 0.7rem;
      color: var(--text3);
      padding: 16px 0;
      line-height: 1.8;
    }
    .disclaimer strong { color: var(--text2); }

    /* ===== ANIMATIONS ===== */
    @keyframes ballPop {
      0% { transform: scale(0); opacity: 0; }
      65% { transform: scale(1.15); }
      100% { transform: scale(1); opacity: 1; }
    }
    @keyframes cardUp {
      from { transform: translateY(10px); opacity: 0; }
      to { transform: translateY(0); opacity: 1; }
    }
    .ball-a { animation: ballPop 0.35s cubic-bezier(0.34, 1.56, 0.64, 1) forwards; }
    .r-card { animation: cardUp 0.35s ease forwards; }

    /* ===== MOBILE ===== */
    @media (max-width: 480px) {
      .container { padding: 0 14px 50px; }
      header { padding: 32px 0 20px; }
    }
  </style>
</head>
<body>
<div class="container">

  <!-- HEADER -->
  <header>
    <div class="logo">
      <div class="logo-icon">🎰</div>
      <h1>百万人生</h1>
    </div>
    <div class="sub">体彩数据分析 · 智能推荐</div>
  </header>

  <!-- TYPE SELECTOR -->
  <div class="type-row">
    <button class="type-btn active" data-type="ssq" id="btnSSQ">
      <span class="t-icon">🔴</span>
      <span>双色球</span>
    </button>
    <button class="type-btn" data-type="dlt" id="btnDLT">
      <span class="t-icon">🔵</span>
      <span>大乐透</span>
    </button>
  </div>

  <!-- HISTORY -->
  <div class="card">
    <div class="s-title">历史开奖</div>
    <div class="h-scroll" id="hWrap"></div>
  </div>

  <!-- ALGORITHMS -->
  <div class="card">
    <div class="s-title">分析算法</div>
    <div class="algo-list" id="aList">
      <div class="algo-item selected" data-algo="hot-cold">
        <div class="algo-icon">🔥</div>
        <div>
          <div class="algo-name">冷热号分析</div>
          <div class="algo-desc">频率 + 遗漏值加权采样</div>
        </div>
        <div class="algo-check">✓</div>
      </div>
      <div class="algo-item" data-algo="odd-even">
        <div class="algo-icon">⚡</div>
        <div>
          <div class="algo-name">奇偶分析</div>
          <div class="algo-desc">历史奇偶比例模拟</div>
        </div>
        <div class="algo-check">✓</div>
      </div>
      <div class="algo-item" data-algo="zone">
        <div class="algo-icon">📐</div>
        <div>
          <div class="algo-name">区间分析</div>
          <div class="algo-desc">号码在区间分布统计</div>
        </div>
        <div class="algo-check">✓</div>
      </div>
      <div class="algo-item" data-algo="tail">
        <div class="algo-icon">🔢</div>
        <div>
          <div class="algo-name">尾数分析</div>
          <div class="algo-desc">0-9 尾数热态分布</div>
        </div>
        <div class="algo-check">✓</div>
      </div>
      <div class="algo-item selected" data-algo="monte-carlo">
        <div class="algo-icon">🤖</div>
        <div>
          <div class="algo-name">蒙特卡洛模拟</div>
          <div class="algo-desc">1000次随机模拟 · 最优选取</div>
        </div>
        <div class="algo-check">✓</div>
      </div>
    </div>
  </div>

  <!-- GENERATE -->
  <button class="gen-btn" id="genBtn">🎯 生成推荐号码</button>

  <!-- RESULTS -->
  <div class="card">
    <div class="s-title">推荐结果</div>
    <div id="rArea">
      <div class="r-empty">
        <div class="r-empty-icon">✨</div>
        <div>选择算法，点击按钮生成推荐号码</div>
      </div>
    </div>
  </div>

  <!-- STATS -->
  <div class="card">
    <div class="s-title">统计分析</div>
    <div class="stat-tabs" id="sTabs">
      <button class="s-tab active" data-s="hot">🔥 热号</button>
      <button class="s-tab" data-s="cold">❄️ 冷号</button>
      <button class="s-tab" data-s="miss">⏳ 遗漏值</button>
    </div>
    <div class="stat-rows" id="sList"></div>
  </div>

  <!-- DISCLAIMER -->
  <div class="disclaimer">
    ⚠️ <strong>彩票是随机游戏</strong>，历史数据仅供参考<br>
    请理性购彩，量力而行
  </div>

</div>

<script>
// ==================== DATA ====================
const SSQ_HISTORY = [
  {p:"2026043",r:[2,7,12,19,24,31],b:10},
  {p:"2026042",r:[3,10,13,15,25,27],b:8},

  {p:"2026024",r:[6,10,15,21,23,29],b:7},
  {p:"2026023",r:[1,3,9,11,18,33],b:5},
  {p:"2026022",r:[4,8,14,23,27,32],b:12},
  {p:"2026021",r:[2,6,10,16,25,31],b:8},
  {p:"2026020",r:[5,11,13,19,26,30],b:3},
  {p:"2026019",r:[3,7,12,17,27,29],b:6},
  {p:"2026018",r:[1,4,10,15,21,28],b:11},
  {p:"2026017",r:[2,9,14,18,24,33],b:4},
  {p:"2026016",r:[5,8,13,20,25,32],b:9},
  {p:"2026015",r:[3,6,11,19,26,30],b:7},
  {p:"2026014",r:[1,8,15,22,27,31],b:5},
];

const DLT_HISTORY = [
  {p:"26043",f:[4,10,19,25,34],b:[2,9]},
  {p:"26042",f:[6,9,14,16,25],b:[3,6]},
  {p:"26041",f:[24,25,27,29,34],b:[2,6]},
  {p:"26040",f:[6,12,13,21,34],b:[8,9]},
  {p:"26039",f:[9,11,20,26,27],b:[6,9]},
  {p:"26038",f:[8,17,21,33,35],b:[6,7]},
  {p:"26037",f:[4,10,15,17,21],b:[3,9]},
  {p:"26036",f:[1,2,6,16,18],b:[4,8]},

  {p:"26027",f:[4,8,17,24,31],b:[3,9]},
  {p:"26026",f:[7,13,19,28,30],b:[4,11]},
  {p:"26025",f:[2,11,21,26,32],b:[5,8]},
  {p:"26024",f:[5,14,18,25,33],b:[2,7]},
  {p:"26023",f:[1,9,17,23,29],b:[3,6]},
  {p:"26022",f:[6,12,20,27,31],b:[1,5]},
  {p:"26021",f:[3,10,18,24,35],b:[4,9]},
  {p:"26020",f:[5,11,19,26,30],b:[2,6]},
  {p:"26019",f:[2,8,15,22,28],b:[3,7]},
  {p:"26018",f:[4,9,16,25,34],b:[1,5]},
  {p:"26017",f:[1,7,13,21,29],b:[4,8]},
  {p:"26016",f:[6,10,18,27,33],b:[2,9]},
  {p:"26015",f:[3,12,19,24,32],b:[1,6]},
  {p:"26014",f:[5,9,14,23,31],b:[3,7]},
];

// ==================== STATE ====================
let cur = 'ssq';
let sel = new Set(['hot-cold', 'monte-carlo']);
let curStat = 'hot';

// ==================== INIT ====================
function init() {
  renderH();
  renderS();
  bind();
}

function hist() { return cur === 'ssq' ? SSQ_HISTORY : DLT_HISTORY; }

// ==================== RENDER HISTORY ====================
function renderH() {
  const h = hist();
  document.getElementById('hWrap').innerHTML = h.map(item => {
    if (cur === 'ssq') {
      const r = item.r.map(n => `<span class="ball ball-r">${n}</span>`).join('');
      return `<div class="h-row"><span class="h-p">${item.p}</span><div class="h-balls">${r}<span class="sep">+</span><span class="ball ball-b">${item.b}</span></div></div>`;
    } else {
      const f = item.f.map(n => `<span class="ball ball-r">${n}</span>`).join('');
      const b = item.b.map(n => `<span class="ball ball-b">${n}</span>`).join('');
      return `<div class="h-row"><span class="h-p">${item.p}</span><div class="h-balls">${f}<span class="sep">·</span>${b}</div></div>`;
    }
  }).join('');
}

// ==================== RENDER STATS ====================
function renderS() {
  const h = hist();
  const lim = cur === 'ssq' ? 33 : 35;
  const blim = cur === 'ssq' ? 16 : 12;

  const rf = {}, rm = {};
  const bf = {}, bm = {};
  for (let i = 1; i <= lim; i++) { rf[i] = 0; rm[i] = 0; }
  for (let i = 1; i <= blim; i++) { bf[i] = 0; bm[i] = 0; }

  h.forEach(item => {
    item.r.forEach(n => { rf[n]++; rm[n] = 0; });
    (Array.isArray(item.b) ? item.b : [item.b]).forEach(n => { bf[n]++; bm[n] = 0; });
    for (let i = 1; i <= lim; i++) if (rf[i] === 0) rm[i]++;
    for (let i = 1; i <= blim; i++) if (bf[i] === 0) bm[i]++;
  });

  let entries = Object.entries(rf).map(([n, f]) => ({ n: +n, f, m: rm[+n] }));
  entries.sort((a, b) => {
    if (curStat === 'hot') return b.f - a.f;
    if (curStat === 'cold') return a.f - b.f;
    return b.m - a.m;
  });
  entries = entries.slice(0, 10);

  const maxF = Math.max(...entries.map(e => e.f));
  const maxM = Math.max(...entries.map(e => e.m));

  document.getElementById('sList').innerHTML = entries.map(e => {
    const w = curStat === 'miss' ? (maxM ? e.m / maxM * 100 : 0) : (maxF ? e.f / maxF * 100 : 0);
    const label = curStat === 'hot' ? `${e.f}次` : curStat === 'cold' ? `${e.f}次` : `遗漏${e.m}期`;
    return `<div class="st-row">
      <span class="ball ball-r">${e.n}</span>
      <span class="st-name">第${e.n}号</span>
      <div class="st-bar"><div class="st-bar-fill" style="width:${w}%"></div></div>
      <span class="st-val">${label}</span>
    </div>`;
  }).join('');
}

// ==================== BIND ====================
function bind() {
  document.getElementById('btnSSQ').onclick = () => { cur = 'ssq'; document.getElementById('btnSSQ').classList.add('active'); document.getElementById('btnDLT').classList.remove('active'); renderH(); renderS(); };
  document.getElementById('btnDLT').onclick = () => { cur = 'dlt'; document.getElementById('btnDLT').classList.add('active'); document.getElementById('btnSSQ').classList.remove('active'); renderH(); renderS(); };

  document.querySelectorAll('.algo-item').forEach(item => {
    item.onclick = () => {
      const a = item.dataset.algo;
      if (sel.has(a)) { if (sel.size > 1) { sel.delete(a); item.classList.remove('selected'); } }
      else { sel.add(a); item.classList.add('selected'); }
    };
  });

  document.querySelectorAll('.s-tab').forEach(tab => {
    tab.onclick = () => {
      curStat = tab.dataset.s;
      document.querySelectorAll('.s-tab').forEach(t => t.classList.remove('active'));
      tab.classList.add('active');
      renderS();
    };
  });

  document.getElementById('genBtn').onclick = gen;
}

// ==================== ALGOS ====================
function wSample(arr, wts, cnt) {
  const ps = arr.map((v, i) => ({ v, w: wts[i] || 0.01 }));
  const tot = ps.reduce((s, p) => s + p.w, 0);
  const pr = ps.map(p => p.w / tot);
  const ch = [], pool = [...ps], pp = [...pr];
  for (let i = 0; i < cnt && pool.length > 0; i++) {
    let r = Math.random(), c = 0;
    for (let j = 0; j < pp.length; j++) { c += pp[j]; if (r <= c) { ch.push(pool[j].v); pool.splice(j, 1); pp.splice(j, 1); break; } }
    if (ch.length === i) { ch.push(pool[0].v); pool.shift(); pp.shift(); }
  }
  return ch;
}

function shuf(arr) {
  const a = [...arr];
  for (let i = a.length - 1; i > 0; i--) { const j = Math.floor(Math.random() * (i + 1)); [a[i], a[j]] = [a[j], a[i]]; }
  return a;
}

function algos(type) {
  const h = type === 'ssq' ? SSQ_HISTORY : DLT_HISTORY;
  const lim = type === 'ssq' ? 33 : 35;
  const blim = type === 'ssq' ? 16 : 12;

  const rf = {}, rm = {}, bf = {}, bm = {};
  for (let i = 1; i <= lim; i++) { rf[i] = 0; rm[i] = 0; }
  for (let i = 1; i <= blim; i++) { bf[i] = 0; bm[i] = 0; }

  h.forEach(item => {
    item.r.forEach(n => { rf[n]++; rm[n] = 0; });
    (Array.isArray(item.b) ? item.b : [item.b]).forEach(n => { bf[n]++; bm[n] = 0; });
    for (let i = 1; i <= lim; i++) if (rf[i] === 0) rm[i]++;
    for (let i = 1; i <= blim; i++) if (bf[i] === 0) bm[i]++;
  });

  const rv = Object.keys(rf).map(Number);
  const bv = Object.keys(bf).map(Number);
  const rw = rv.map(n => (rf[n] || 0) + (rm[n] || 0) * 1.5);
  const bw = bv.map(n => (bf[n] || 0) + (bm[n] || 0) * 1.5);

  return {
    hotCold(type) {
      const reds = wSample(rv, rw, type === 'ssq' ? 6 : 5);
      let blue;
      if (type === 'ssq') {
        blue = [wSample(bv, bw, 1)[0]];
      } else {
        const b1 = wSample(bv, bw, 1)[0];
        const rem = bv.filter(n => n !== b1);
        const rw2 = bw.map((w, i) => bv[i] === b1 ? 0 : w);
        const b2 = wSample(rem, rw2, 1)[0];
        blue = [b1, b2].sort((a, b) => a - b);
      }
      return { reds, blue };
    },
    oddEven(type) {
      const target = type === 'ssq' ? 4 : 3;
      const odds = rv.filter(n => n % 2 === 1);
      const evens = rv.filter(n => n % 2 === 0);
      const reds = [];
      const so = shuf(odds), se = shuf(evens);
      let added = 0;
      while (reds.length < (type === 'ssq' ? 6 : 5)) {
        if (added < target && so.length) reds.push(so.shift());
        else if (se.length) reds.push(se.shift());
        else if (so.length) reds.push(so.shift());
        added++;
      }
      reds.sort((a, b) => a - b);
      const blue = type === 'ssq' ? [Math.floor(Math.random() * blim) + 1] : shuf([1, 2]).map(() => Math.floor(Math.random() * blim) + 1).sort((a, b) => a - b);
      return { reds, blue };
    },
    zone(type) {
      const zones = type === 'ssq' ? 3 : 5;
      const per = type === 'ssq' ? 2 : 1;
      const reds = [];
      for (let z = 0; z < zones; z++) {
        const s = Math.floor(z * lim / zones) + 1;
        const e = Math.floor((z + 1) * lim / zones);
        const zn = []; for (let n = s; n <= e; n++) zn.push(n);
        const zw = zn.map(n => rf[n] || 0);
        reds.push(...wSample(zn, zw, per));
      }
      reds.sort((a, b) => a - b);
      const blue = type === 'ssq' ? [Math.floor(Math.random() * blim) + 1] : shuf([1, 2]).map(() => Math.floor(Math.random() * blim) + 1).sort((a, b) => a - b);
      return { reds, blue };
    },
    tail(type) {
      const tails = {}; for (let i = 0; i <= 9; i++) tails[i] = 0;
      h.forEach(item => item.r.forEach(n => { tails[n % 10]++; }));
      const top = Object.entries(tails).sort((a, b) => b[1] - a[1]).slice(0, 5).map(([t]) => +t);
      const reds = [];
      while (reds.length < (type === 'ssq' ? 6 : 5)) {
        const t = top[Math.floor(Math.random() * top.length)];
        const cands = rv.filter(n => n % 10 === t && !reds.includes(n));
        if (cands.length) reds.push(cands[Math.floor(Math.random() * cands.length)]);
        else { const c2 = rv.filter(n => !reds.includes(n)); if (c2.length) reds.push(c2[Math.floor(Math.random() * c2.length)]); }
      }
      reds.sort((a, b) => a - b);
      const blue = type === 'ssq' ? [Math.floor(Math.random() * blim) + 1] : shuf([1, 2]).map(() => Math.floor(Math.random() * blim) + 1).sort((a, b) => a - b);
      return { reds, blue };
    },
    monteCarlo(type) {
      let best = null, bestS = -1;
      for (let t = 0; t < 1000; t++) {
        const reds = shuf(Array.from({ length: lim }, (_, i) => i + 1)).slice(0, type === 'ssq' ? 6 : 5).sort((a, b) => a - b);
        const sc = reds.reduce((s, n) => s + (rf[n] || 0) + (rm[n] || 0), 0);
        const blue = type === 'ssq' ? [Math.floor(Math.random() * blim) + 1] : shuf([1, 2]).map(() => Math.floor(Math.random() * blim) + 1).sort((a, b) => a - b);
        if (sc > bestS) { bestS = sc; best = { reds, blue }; }
      }
      return best || { reds: [1, 2, 3, 4, 5, 6], blue: [1] };
    }
  };
}

// ==================== GENERATE ====================
function gen() {
  const area = document.getElementById('rArea');
  if (sel.size === 0) {
    area.innerHTML = `<div class="r-empty"><div class="r-empty-icon">⚠️</div><div>请至少选择一个算法</div></div>`;
    return;
  }

  const ag = algos(cur);
  const names = { 'hot-cold': '冷热号', 'odd-even': '奇偶', 'zone': '区间', 'tail': '尾数', 'monte-carlo': '蒙特卡洛' };
  const keyMap = { 'hot-cold': 'hotCold', 'odd-even': 'oddEven', 'zone': 'zone', 'tail': 'tail', 'monte-carlo': 'monteCarlo' };

  const results = [];
  for (const a of sel) {
    const k = keyMap[a];
    if (k && ag[k]) results.push({ a, name: names[a] || a, nums: ag[k](cur) });
  }

  area.innerHTML = results.map((r, i) => {
    const rh = r.nums.reds.map((n, idx) => `<span class="ball ball-r ball-a" style="animation-delay:${idx * 0.05}s">${n}</span>`).join('');
    const bh = r.nums.blue.map((n, idx) => `<span class="ball ball-b ball-a" style="animation-delay:${(r.nums.reds.length + idx) * 0.05}s">${n}</span>`).join('');
    const sep = cur === 'ssq' ? '<span class="r-sep">+</span>' : '<span class="r-sep">·</span>';
    return `<div class="r-card" style="animation-delay:${i * 0.1}s">
      <div class="r-head">
        <span class="r-num">第${i + 1}注</span>
        <span class="r-algo">${r.name}</span>
      </div>
      <div class="r-balls">${rh}${sep}${bh}</div>
    </div>`;
  }).join('');
}
